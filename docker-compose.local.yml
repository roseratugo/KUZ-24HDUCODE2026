services:
  mongodb:
    image: mongo:7
    container_name: kuz-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: kuz3026
    volumes:
      - mongodb_data:/data/db
    networks:
      - kuz-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: kuz-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/kuz3026
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - kuz-network
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: kuz-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - kuz-network
    depends_on:
      - backend

  bot-python:
    build: ./bot-python
    container_name: kuz-bot-python
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/kuz3026
      - GAME_ID=kuz-default
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - kuz-network
    depends_on:
      mongodb:
        condition: service_healthy

networks:
  kuz-network:
    driver: bridge

volumes:
  mongodb_data:
