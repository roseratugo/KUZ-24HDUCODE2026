services:
  mongodb:
    image: mongo:7
    container_name: kuz-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: kuz3026
    volumes:
      - mongodb_data:/data/db
    networks:
      - kuz-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/roseratugo/kuz-backend:latest
    container_name: kuz-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/kuz3026
    networks:
      - kuz-network
    depends_on:
      mongodb:
        condition: service_healthy

  mongo-express:
    image: mongo-express:latest
    container_name: kuz-mongo-express
    restart: unless-stopped
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongodb:27017/kuz3026
      - ME_CONFIG_BASICAUTH=false
    networks:
      - kuz-network
      - proxy_net
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    image: ghcr.io/roseratugo/kuz-frontend:latest
    container_name: kuz-frontend
    restart: unless-stopped
    networks:
      - kuz-network
      - proxy_net
    depends_on:
      - backend

  frontend-3d:
    image: ghcr.io/roseratugo/kuz-frontend-3d:latest
    container_name: kuz-frontend-3d
    restart: unless-stopped
    networks:
      - kuz-network
      - proxy_net
    depends_on:
      - backend

  bot-python:
    image: ghcr.io/roseratugo/kuz-bot-python:latest
    container_name: kuz-bot-python
    restart: unless-stopped
    environment:
      - MONGO_URI=mongodb://mongodb:27017/kuz3026
      - GAME_ID=kuz-team
    networks:
      - kuz-network
      - proxy_net
    depends_on:
      mongodb:
        condition: service_healthy

networks:
  kuz-network:
    driver: bridge
  proxy_net:
    external: true

volumes:
  mongodb_data:
